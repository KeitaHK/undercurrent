<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Undercurrent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f2ed;--surface:#ffffff;--surface2:#f0ece6;
      --text:#1a1714;--muted:#7a746c;--accent:#c4531a;
      --border:#e0d9d0;
      --lifestyle:#c4531a;--tech:#1a6bc4;--sports:#1a9c4e;
      --serif:'Noto Serif JP',serif;--sans:'Noto Sans JP',sans-serif;
    }
    body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}

    /* NAV */
    nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(245,242,237,0.95);backdrop-filter:blur(8px);z-index:100}
    .logo{font-family:var(--serif);font-size:1.5rem;color:var(--text);letter-spacing:0.05em;cursor:pointer}
    .logo span{color:var(--accent)}
    .nav-cats{display:flex;gap:1.5rem}
    .nav-cats button{background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:0.85rem;cursor:pointer;padding:4px 0;border-bottom:2px solid transparent;transition:all .2s}
    .nav-cats button.active,.nav-cats button:hover{color:var(--text);border-bottom-color:var(--accent)}

    /* LIST VIEW */
    #list-view{}
    .hero{padding:3rem 2rem 2rem;display:grid;grid-template-columns:1fr 1fr;gap:2rem;max-width:1100px;margin:0 auto}
    .hero-main{background:var(--surface);padding:2rem;position:relative;cursor:pointer;overflow:hidden;border:1px solid var(--border);transition:box-shadow .2s}
    .hero-main::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
    .hero-main:hover{box-shadow:0 4px 20px rgba(0,0,0,0.08)}
    .cat-badge{display:inline-block;font-size:0.68rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:3px 8px;margin-bottom:1rem;border-radius:2px}
    .cat-lifestyle{background:rgba(196,83,26,0.1);color:var(--lifestyle)}
    .cat-tech{background:rgba(26,107,196,0.1);color:var(--tech)}
    .cat-sports{background:rgba(26,156,78,0.1);color:var(--sports)}
    .hero-main h2{font-family:var(--serif);font-size:1.7rem;line-height:1.4;margin-bottom:0.75rem;color:var(--text)}
    .hero-main p{color:var(--muted);font-size:0.9rem;line-height:1.7}
    .hero-main .meta{margin-top:1.25rem;font-size:0.75rem;color:var(--muted);display:flex;gap:1rem}
    .hero-sub{display:flex;flex-direction:column;gap:1rem}
    .sub-card{background:var(--surface);padding:1.25rem;cursor:pointer;display:flex;gap:1rem;align-items:flex-start;border:1px solid var(--border);transition:box-shadow .2s}
    .sub-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.07)}
    .sub-card h3{font-family:var(--serif);font-size:1rem;line-height:1.5;flex:1;color:var(--text)}
    .sub-num{font-family:var(--serif);font-size:2rem;color:var(--border);font-weight:700;line-height:1;min-width:2.5rem}
    .section{max-width:1100px;margin:0 auto;padding:2rem}
    .section-hd{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
    .section-hd h2{font-family:var(--serif);font-size:1.1rem;letter-spacing:0.05em;color:var(--text)}
    .section-hd::after{content:'';flex:1;height:1px;background:var(--border)}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
    .card{background:var(--surface);padding:1.5rem;cursor:pointer;border:1px solid var(--border);transition:box-shadow .2s}
    .card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08)}
    .card h3{font-family:var(--serif);font-size:1rem;line-height:1.6;margin:0.5rem 0 0.75rem;color:var(--text)}
    .card p{color:var(--muted);font-size:0.8rem;line-height:1.6}
    .card .meta{margin-top:1rem;font-size:0.72rem;color:var(--muted);display:flex;justify-content:space-between}

    /* ARTICLE VIEW */
    #article-view{display:none;max-width:720px;margin:0 auto;padding:3rem 2rem}
    .article-back{background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:0.85rem;cursor:pointer;margin-bottom:2rem;display:flex;align-items:center;gap:6px;padding:0}
    .article-back:hover{color:var(--accent)}
    .article-cat{margin-bottom:1rem}
    .article-title{font-family:var(--serif);font-size:2rem;line-height:1.4;margin-bottom:1rem;color:var(--text)}
    .article-meta{font-size:0.8rem;color:var(--muted);margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);display:flex;gap:1.5rem}
    .article-body{font-family:var(--serif);font-size:1.05rem;line-height:2;color:var(--text)}
    .article-body p{margin-bottom:1.5rem}

    footer{text-align:center;padding:3rem 2rem;border-top:1px solid var(--border);color:var(--muted);font-size:0.8rem;font-family:var(--serif);letter-spacing:0.1em}
    @media(max-width:768px){
      .hero{grid-template-columns:1fr}
      .grid{grid-template-columns:1fr}
      nav{flex-wrap:wrap;gap:0.75rem}
      .article-title{font-size:1.5rem}
    }
  </style>
</head>
<body>

<nav>
  <div class="logo" onclick="showList()">Under<span>current</span></div>
  <div class="nav-cats">
    <button class="active" onclick="filterCat('all',this)">ALL</button>
    <button onclick="filterCat('lifestyle',this)">LIFESTYLE</button>
    <button onclick="filterCat('tech',this)">TECH · IT</button>
    <button onclick="filterCat('sports',this)">SPORTS</button>
  </div>
</nav>

<div id="list-view">
  <div class="hero">
    <div class="hero-main" id="hero-main"></div>
    <div class="hero-sub" id="hero-sub"></div>
  </div>
  <div class="section">
    <div class="section-hd"><h2>最新記事</h2></div>
    <div class="grid" id="articles-grid"></div>
  </div>
</div>

<div id="article-view">
  <button class="article-back" onclick="showList()">← 一覧に戻る</button>
  <div class="article-cat" id="av-cat"></div>
  <h1 class="article-title" id="av-title"></h1>
  <div class="article-meta" id="av-meta"></div>
  <div class="article-body" id="av-body"></div>
</div>

<footer>Undercurrent — すべての記事は編集部が監修しています</footer>

<script src="articles.js"></script>
<script>
  let articles = JSON.parse(localStorage.getItem('fold_articles')) || ARTICLES;
  let currentCat = 'all';
  const catColors = {lifestyle:'cat-lifestyle',tech:'cat-tech',sports:'cat-sports'};
  const catLabels = {lifestyle:'LIFESTYLE',tech:'TECH · IT',sports:'SPORTS'};

  function openArticle(id) {
    const a = articles.find(x => x.id === id);
    if (!a) return;
    document.getElementById('av-cat').innerHTML = `<span class="cat-badge ${catColors[a.cat]}">${catLabels[a.cat]}</span>`;
    document.getElementById('av-title').textContent = a.title;
    document.getElementById('av-meta').innerHTML = `<span>${a.date}</span><span>${a.read} min read</span>`;
    document.getElementById('av-body').innerHTML = a.content || `<p>${a.body}</p>`;
    document.getElementById('list-view').style.display = 'none';
    document.getElementById('article-view').style.display = 'block';
    window.scrollTo(0,0);
  }

  function showList() {
    document.getElementById('article-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    window.scrollTo(0,0);
  }

  function renderHero() {
    const top = articles[0];
    if (!top) return;
    document.getElementById('hero-main').innerHTML = `
      <span class="cat-badge ${catColors[top.cat]}">${catLabels[top.cat]}</span>
      <h2>${top.title}</h2>
      <p>${top.body}</p>
      <div class="meta"><span>${top.date}</span><span>${top.read} min read</span></div>`;
    document.getElementById('hero-main').onclick = () => openArticle(top.id);
    document.getElementById('hero-sub').innerHTML = articles.slice(1,4).map((a,i) => `
      <div class="sub-card" onclick="openArticle(${a.id})">
        <span class="sub-num">0${i+1}</span>
        <div><span class="cat-badge ${catColors[a.cat]}">${catLabels[a.cat]}</span><h3>${a.title}</h3></div>
      </div>`).join('');
  }

  function renderGrid() {
    const filtered = currentCat==='all' ? articles : articles.filter(a=>a.cat===currentCat);
    document.getElementById('articles-grid').innerHTML = filtered.map(a => `
      <div class="card" onclick="openArticle(${a.id})">
        <span class="cat-badge ${catColors[a.cat]}">${catLabels[a.cat]}</span>
        <h3>${a.title}</h3>
        <p>${a.body}</p>
        <div class="meta"><span>${a.date}</span><span>${a.read} min</span></div>
      </div>`).join('');
  }

  function filterCat(cat, btn) {
    currentCat = cat;
    document.querySelectorAll('.nav-cats button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  }

  renderHero();
  renderGrid();
</script>
</body>
</html>
