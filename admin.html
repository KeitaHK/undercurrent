<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Undercurrent — 管理画面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f2ed;--surface:#fff;--surface2:#f0ece6;
      --text:#1a1714;--muted:#7a746c;--accent:#c4531a;--border:#e0d9d0;
      --serif:'Noto Serif JP',serif;--sans:'Noto Sans JP',sans-serif;
    }
    body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
    #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
    .login-box{background:var(--surface);padding:2.5rem;width:340px;border:1px solid var(--border)}
    .login-box h1{font-family:var(--serif);font-size:1.3rem;margin-bottom:0.25rem}
    .login-box h1 span{color:var(--accent)}
    .login-box p{color:var(--muted);font-size:0.8rem;margin-bottom:1.5rem}
    .login-box input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 12px;font-family:var(--sans);font-size:0.9rem;outline:none;margin-bottom:1rem}
    .login-box input:focus{border-color:var(--accent)}
    .login-btn{width:100%;background:var(--accent);color:#fff;border:none;padding:10px;font-weight:700;cursor:pointer;font-family:var(--sans)}
    .login-error{color:#c0392b;font-size:0.8rem;margin-top:0.75rem;display:none}
    #admin-screen{display:none}
    nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);background:rgba(245,242,237,0.97);flex-wrap:wrap;gap:0.5rem}
    .logo{font-family:var(--serif);font-size:1.4rem}
    .logo span{color:var(--accent)}
    .nav-right{display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap}
    .nav-tab{background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:0.85rem;cursor:pointer;padding:6px 12px;border-bottom:2px solid transparent}
    .nav-tab.active{color:var(--text);border-bottom-color:var(--accent)}
    .view-link{text-decoration:none;font-size:0.8rem;color:var(--muted);border:1px solid var(--border);padding:6px 12px;font-family:var(--sans)}
    .view-link:hover{border-color:var(--accent);color:var(--accent)}
    .logout-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;font-size:0.8rem;font-family:var(--sans)}
    .tab-content{display:none}
    .tab-content.active{display:block}
    .admin-body{max-width:860px;margin:2rem auto;padding:0 2rem}
    .admin-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
    .admin-hd h2{font-family:var(--serif);font-size:1.2rem}
    .btn-primary{background:var(--accent);color:#fff;border:none;padding:8px 18px;font-weight:700;cursor:pointer;font-size:0.85rem;font-family:var(--sans)}
    .article-list{display:flex;flex-direction:column;gap:1px;background:var(--border)}
    .article-row{background:var(--surface);padding:0.9rem 1.25rem;display:flex;align-items:center;gap:0.75rem}
    .article-row:hover{background:var(--surface2)}
    .row-title{flex:1;font-size:0.88rem}
    .row-date{font-size:0.75rem;color:var(--muted);min-width:80px}
    .cat-badge{display:inline-block;font-size:0.68rem;font-weight:700;letter-spacing:0.08em;padding:2px 7px;border-radius:2px;white-space:nowrap}
    .edit-btn,.del-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:4px 10px;cursor:pointer;font-size:0.75rem;font-family:var(--sans);white-space:nowrap}
    .edit-btn:hover{border-color:var(--accent);color:var(--accent)}
    .del-btn:hover{border-color:#c0392b;color:#c0392b}
    .cat-list{display:flex;flex-direction:column;gap:1px;background:var(--border);margin-bottom:1.5rem}
    .cat-row{background:var(--surface);padding:0.9rem 1.25rem;display:flex;align-items:center;gap:1rem}
    .cat-swatch{width:14px;height:14px;border-radius:50%;flex-shrink:0}
    .cat-row-label{flex:1;font-size:0.9rem;font-weight:500}
    .cat-row-id{font-size:0.75rem;color:var(--muted);font-family:monospace}
    .add-cat-form{background:var(--surface);border:1px solid var(--border);padding:1.25rem;display:flex;gap:0.75rem;align-items:flex-end;flex-wrap:wrap}
    .add-cat-form .fg{display:flex;flex-direction:column;gap:4px}
    .add-cat-form label{font-size:0.75rem;color:var(--muted)}
    .add-cat-form input[type=text]{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;font-family:var(--sans);font-size:0.88rem;outline:none;width:150px}
    .add-cat-form input[type=color]{width:48px;height:32px;border:1px solid var(--border);cursor:pointer;padding:2px}
    .form-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;overflow-y:auto}
    .form-overlay.open{display:flex;align-items:flex-start;justify-content:center;padding:2rem}
    .form-panel{background:var(--surface);width:100%;max-width:680px;padding:2rem;border:1px solid var(--border)}
    .form-panel h2{font-family:var(--serif);font-size:1.2rem;margin-bottom:1.5rem}
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;font-size:0.78rem;color:var(--muted);margin-bottom:4px}
    .form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;font-family:var(--sans);font-size:0.9rem;outline:none}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
    .form-group textarea{height:220px;resize:vertical;font-family:var(--serif);line-height:1.8}
    .form-note{font-size:0.73rem;color:var(--muted);margin-top:3px}
    .form-actions{display:flex;gap:1rem;margin-top:1.5rem}
    .cancel-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:10px 20px;cursor:pointer;font-family:var(--sans)}
    .img-upload-area{border:2px dashed var(--border);padding:1.5rem;text-align:center;cursor:pointer;transition:border-color .2s;background:var(--bg)}
    .img-upload-area:hover{border-color:var(--accent)}
    .img-upload-area input{display:none}
    .img-preview{max-width:100%;max-height:200px;margin-top:0.75rem;display:none;object-fit:cover}
    .img-clear{background:none;border:1px solid var(--border);color:var(--muted);padding:4px 10px;cursor:pointer;font-size:0.75rem;margin-top:0.5rem;display:none;font-family:var(--sans)}
    .empty{padding:3rem;text-align:center;color:var(--muted);font-size:0.9rem;background:var(--surface)}
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>Under<span>current</span></h1>
    <p>管理画面にアクセスするにはパスワードが必要です</p>
    <input type="password" id="pw-input" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">ログイン</button>
    <p class="login-error" id="login-error">パスワードが違います</p>
  </div>
</div>

<div id="admin-screen">
  <nav>
    <div class="logo">Under<span>current</span></div>
    <div class="nav-right">
      <button class="nav-tab active" onclick="switchTab('articles',this)">記事</button>
      <button class="nav-tab" onclick="switchTab('categories',this)">カテゴリ</button>
      <a href="index.html" class="view-link">← 公開ページ</a>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </nav>

  <div class="tab-content active" id="tab-articles">
    <div class="admin-body">
      <div class="admin-hd">
        <h2>記事一覧</h2>
        <button class="btn-primary" onclick="openForm()">+ 新規記事</button>
      </div>
      <div class="article-list" id="adminList"></div>
    </div>
  </div>

  <div class="tab-content" id="tab-categories">
    <div class="admin-body">
      <div class="admin-hd"><h2>カテゴリ管理</h2></div>
      <div class="cat-list" id="catList"></div>
      <div class="add-cat-form">
        <div class="fg"><label>カテゴリ名</label><input type="text" id="newCatLabel" placeholder="例: FOOD"></div>
        <div class="fg"><label>ID（半角英数）</label><input type="text" id="newCatId" placeholder="例: food"></div>
        <div class="fg"><label>カラー</label><input type="color" id="newCatColor" value="#1a9c4e"></div>
        <button class="btn-primary" onclick="addCategory()" style="align-self:flex-end">追加</button>
      </div>
    </div>
  </div>
</div>

<div class="form-overlay" id="formOverlay">
  <div class="form-panel">
    <h2 id="formTitle">新規記事を作成</h2>
    <div class="form-group"><label>タイトル</label><input id="fTitle" placeholder="記事タイトル"></div>
    <div class="form-group"><label>カテゴリ</label><select id="fCat"></select></div>
    <div class="form-group">
      <label>本文</label>
      <textarea id="fBody" placeholder="記事の本文を入力...&#10;&#10;空行で段落が分かれます。&#10;行頭に ## を入れると小見出しになります。"></textarea>
      <p class="form-note">空行 → 段落区切り　/　行頭 ## → 小見出し</p>
    </div>
    <div class="form-group">
      <label>アイキャッチ画像</label>
      <div class="img-upload-area" onclick="document.getElementById('fImgInput').click()">
        <input type="file" id="fImgInput" accept="image/*" onchange="handleImgUpload(event)">
        <p style="font-size:0.85rem;color:var(--muted)">クリックして画像を選択</p>
        <img id="fImgPreview" class="img-preview">
      </div>
      <button class="img-clear" id="fImgClear" onclick="clearImage()">画像を削除</button>
    </div>
    <div class="form-group"><label>読了時間（分）</label><input id="fRead" type="number" min="1" max="60" placeholder="5" style="width:100px"></div>
    <div class="form-group"><label>日付</label><input id="fDate" type="date" style="width:180px"></div>
    <div class="form-actions">
      <button class="btn-primary" onclick="saveArticle()">保存する</button>
      <button class="cancel-btn" onclick="closeForm()">キャンセル</button>
    </div>
  </div>
</div>

<script src="articles.js"></script>
<script>
  const PASSWORD = 'fold2026';
  let articles = JSON.parse(localStorage.getItem('uc_articles')) || ARTICLES;
  let categories = JSON.parse(localStorage.getItem('uc_categories')) || DEFAULT_CATEGORIES;
  let editId = null, currentImageData = '';

  function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `${r},${g},${b}`;}
  function getCatStyle(id){const c=categories.find(x=>x.id===id);if(!c)return{bg:'rgba(120,120,120,0.1)',color:'rgb(120,120,120)',label:id};return{bg:`rgba(${c.color},0.12)`,color:`rgb(${c.color})`,label:c.label};}
  function badgeHTML(id){const s=getCatStyle(id);return `<span class="cat-badge" style="background:${s.bg};color:${s.color}">${s.label}</span>`;}

  function login(){
    if(document.getElementById('pw-input').value===PASSWORD){
      sessionStorage.setItem('uc_auth','1');
      document.getElementById('login-screen').style.display='none';
      document.getElementById('admin-screen').style.display='block';
      renderAdmin();renderCatList();populateCatSelect();
    }else{document.getElementById('login-error').style.display='block';document.getElementById('pw-input').value='';}
  }
  function logout(){sessionStorage.removeItem('uc_auth');location.reload();}
  function switchTab(tab,btn){
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');btn.classList.add('active');
  }

  function renderAdmin(){
    const list=document.getElementById('adminList');
    if(!articles.length){list.innerHTML='<div class="empty">記事がありません</div>';return;}
    list.innerHTML=articles.map(a=>`<div class="article-row">${badgeHTML(a.cat)}<span class="row-title">${a.title}</span><span class="row-date">${a.date}</span><button class="edit-btn" onclick="openForm(${a.id})">編集</button><button class="del-btn" onclick="delArticle(${a.id})">削除</button></div>`).join('');
  }

  function populateCatSelect(){
    document.getElementById('fCat').innerHTML=categories.map(c=>`<option value="${c.id}">${c.label}</option>`).join('');
  }

  function openForm(id){
    editId=id||null;currentImageData='';
    document.getElementById('formTitle').textContent=id?'記事を編集':'新規記事を作成';
    populateCatSelect();
    if(id){
      const a=articles.find(x=>x.id===id);
      document.getElementById('fTitle').value=a.title;
      document.getElementById('fCat').value=a.cat;
      document.getElementById('fRead').value=a.read;
      document.getElementById('fDate').value=a.date;
      const raw=a.content?a.content.replace(/<h2>/g,'## ').replace(/<\/h2>/g,'\n').replace(/<p>/g,'').replace(/<\/p>/g,'\n\n').replace(/<br>/g,'\n').trim():a.body;
      document.getElementById('fBody').value=raw;
      if(a.image){currentImageData=a.image;const p=document.getElementById('fImgPreview');p.src=a.image;p.style.display='block';document.getElementById('fImgClear').style.display='inline-block';}
      else{clearImage();}
    }else{
      document.getElementById('fTitle').value='';
      document.getElementById('fCat').value=categories[0]?.id||'';
      document.getElementById('fBody').value='';
      document.getElementById('fRead').value='5';
      document.getElementById('fDate').value=new Date().toISOString().split('T')[0];
      clearImage();
    }
    document.getElementById('formOverlay').classList.add('open');
  }

  function closeForm(){document.getElementById('formOverlay').classList.remove('open');}

  function handleImgUpload(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{currentImageData=ev.target.result;const p=document.getElementById('fImgPreview');p.src=currentImageData;p.style.display='block';document.getElementById('fImgClear').style.display='inline-block';};
    reader.readAsDataURL(file);
  }

  function clearImage(){currentImageData='';document.getElementById('fImgInput').value='';const p=document.getElementById('fImgPreview');p.src='';p.style.display='none';document.getElementById('fImgClear').style.display='none';}

  function textToHTML(text){
    return text.split(/\n\n+/).map(block=>{
      const t=block.trim();
      if(t.startsWith('## '))return `<h2>${t.slice(3)}</h2>`;
      return `<p>${t.replace(/\n/g,'<br>')}</p>`;
    }).join('');
  }

  function saveArticle(){
    const t=document.getElementById('fTitle').value.trim();if(!t)return;
    const raw=document.getElementById('fBody').value.trim();
    const firstPara=raw.split(/\n\n/)[0].replace(/^## /,'');
    const obj={title:t,cat:document.getElementById('fCat').value,body:firstPara,content:textToHTML(raw),read:document.getElementById('fRead').value||'5',date:document.getElementById('fDate').value,image:currentImageData};
    if(editId){Object.assign(articles.find(a=>a.id===editId),obj);}
    else{obj.id=Date.now();articles.unshift(obj);}
    localStorage.setItem('uc_articles',JSON.stringify(articles));
    closeForm();renderAdmin();
  }

  function delArticle(id){
    if(confirm('この記事を削除しますか？')){articles=articles.filter(a=>a.id!==id);localStorage.setItem('uc_articles',JSON.stringify(articles));renderAdmin();}
  }

  function renderCatList(){
    document.getElementById('catList').innerHTML=categories.map(c=>`<div class="cat-row"><span class="cat-swatch" style="background:rgb(${c.color})"></span><span class="cat-row-label">${c.label}</span><span class="cat-row-id">${c.id}</span><button class="del-btn" onclick="delCategory('${c.id}')">削除</button></div>`).join('');
  }

  function addCategory(){
    const label=document.getElementById('newCatLabel').value.trim().toUpperCase();
    const id=document.getElementById('newCatId').value.trim().toLowerCase().replace(/\s+/g,'_');
    const color=hexToRgb(document.getElementById('newCatColor').value);
    if(!label||!id)return;
    if(categories.find(c=>c.id===id)){alert('このIDはすでに使われています');return;}
    categories.push({id,label,color});
    localStorage.setItem('uc_categories',JSON.stringify(categories));
    document.getElementById('newCatLabel').value='';document.getElementById('newCatId').value='';
    renderCatList();populateCatSelect();
  }

  function delCategory(id){
    if(articles.some(a=>a.cat===id)){alert('このカテゴリを使用している記事があります。先に記事を変更してください。');return;}
    if(confirm(`カテゴリ「${id}」を削除しますか？`)){categories=categories.filter(c=>c.id!==id);localStorage.setItem('uc_categories',JSON.stringify(categories));renderCatList();populateCatSelect();}
  }

  if(sessionStorage.getItem('uc_auth')==='1'){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin-screen').style.display='block';
    renderAdmin();renderCatList();populateCatSelect();
  }
</script>
</body>
</html>
