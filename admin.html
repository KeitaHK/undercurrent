<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOLD magazine — 管理画面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;
      --text:#f0ede6;--muted:#888;--accent:#e8c547;
      --lifestyle:#e87c5a;--tech:#5ab4e8;--sports:#5ae89a;
      --serif:'Noto Serif JP',serif;--sans:'Noto Sans JP',sans-serif;
    }
    body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}

    /* LOGIN */
    #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
    .login-box{background:var(--surface);padding:2.5rem;width:340px}
    .login-box h1{font-family:var(--serif);font-size:1.2rem;color:var(--accent);margin-bottom:0.5rem}
    .login-box p{color:var(--muted);font-size:0.8rem;margin-bottom:1.5rem}
    .login-box input{width:100%;background:var(--bg);border:1px solid #333;color:var(--text);padding:10px 12px;font-family:var(--sans);font-size:0.9rem;outline:none;margin-bottom:1rem}
    .login-box input:focus{border-color:var(--accent)}
    .login-btn{width:100%;background:var(--accent);color:#000;border:none;padding:10px;font-weight:700;cursor:pointer;font-family:var(--sans);font-size:0.9rem}
    .login-error{color:#e85a5a;font-size:0.8rem;margin-top:0.75rem;display:none}

    /* ADMIN */
    #admin-screen{display:none}
    nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid #2a2a2a;background:rgba(15,15,15,0.95)}
    .logo{font-family:var(--serif);font-size:1.4rem;color:var(--accent);letter-spacing:0.1em}
    .logo span{color:var(--text);font-weight:400}
    .nav-right{display:flex;gap:1rem;align-items:center}
    .logout-btn{background:none;border:1px solid #444;color:var(--muted);padding:6px 12px;cursor:pointer;font-size:0.8rem;font-family:var(--sans)}
    .logout-btn:hover{border-color:#e85a5a;color:#e85a5a}
    .view-btn{background:none;border:1px solid #444;color:var(--muted);padding:6px 12px;cursor:pointer;font-size:0.8rem;font-family:var(--sans);text-decoration:none;display:inline-block}
    .view-btn:hover{border-color:var(--accent);color:var(--accent)}

    .admin-body{max-width:800px;margin:2rem auto;padding:0 2rem}
    .admin-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
    .admin-hd h2{font-family:var(--serif);font-size:1.2rem}
    .new-btn{background:var(--accent);color:#000;border:none;padding:8px 18px;font-weight:700;cursor:pointer;font-size:0.85rem;font-family:var(--sans)}

    .article-list{display:flex;flex-direction:column;gap:1px;background:#2a2a2a}
    .article-row{background:var(--bg);padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem}
    .article-row:hover{background:var(--surface)}
    .row-title{flex:1;font-size:0.9rem}
    .row-date{font-size:0.75rem;color:var(--muted);min-width:80px}
    .cat-badge{display:inline-block;font-size:0.68rem;font-weight:700;letter-spacing:0.1em;padding:2px 7px;min-width:70px;text-align:center}
    .cat-lifestyle{background:rgba(232,124,90,0.15);color:var(--lifestyle)}
    .cat-tech{background:rgba(90,180,232,0.15);color:var(--tech)}
    .cat-sports{background:rgba(90,232,154,0.15);color:var(--sports)}
    .edit-btn,.del-btn{background:none;border:1px solid #333;color:var(--muted);padding:4px 10px;cursor:pointer;font-size:0.75rem;font-family:var(--sans)}
    .edit-btn:hover{border-color:var(--accent);color:var(--accent)}
    .del-btn:hover{border-color:#e85a5a;color:#e85a5a}

    /* FORM */
    .form-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;overflow-y:auto}
    .form-overlay.open{display:flex;align-items:flex-start;justify-content:center;padding:2rem}
    .form-panel{background:var(--surface);width:100%;max-width:600px;padding:2rem}
    .form-panel h2{font-family:var(--serif);font-size:1.2rem;margin-bottom:1.5rem;color:var(--accent)}
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;font-size:0.78rem;color:var(--muted);margin-bottom:4px;letter-spacing:0.05em}
    .form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg);border:1px solid #333;color:var(--text);padding:8px 12px;font-family:var(--sans);font-size:0.9rem;outline:none}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
    .form-group textarea{height:130px;resize:vertical}
    .form-actions{display:flex;gap:1rem;margin-top:1.5rem}
    .save-btn{background:var(--accent);color:#000;border:none;padding:10px 24px;font-weight:700;cursor:pointer;font-family:var(--sans)}
    .cancel-btn{background:none;border:1px solid #444;color:var(--muted);padding:10px 20px;cursor:pointer;font-family:var(--sans)}

    .empty{padding:3rem;text-align:center;color:var(--muted);font-size:0.9rem;background:var(--bg)}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>FOLD magazine</h1>
    <p>管理画面にアクセスするにはパスワードが必要です</p>
    <input type="password" id="pw-input" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">ログイン</button>
    <p class="login-error" id="login-error">パスワードが違います</p>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <nav>
    <div class="logo">FOLD<span> magazine</span></div>
    <div class="nav-right">
      <a href="index.html" class="view-btn">← 公開ページを見る</a>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </nav>

  <div class="admin-body">
    <div class="admin-hd">
      <h2>記事一覧</h2>
      <button class="new-btn" onclick="openForm()">+ 新規記事</button>
    </div>
    <div class="article-list" id="adminList"></div>
  </div>
</div>

<!-- FORM -->
<div class="form-overlay" id="formOverlay">
  <div class="form-panel">
    <h2 id="formTitle">新規記事を作成</h2>
    <div class="form-group"><label>タイトル</label><input id="fTitle" placeholder="記事タイトル"></div>
    <div class="form-group"><label>カテゴリ</label>
      <select id="fCat">
        <option value="lifestyle">LIFESTYLE</option>
        <option value="tech">TECH · IT</option>
        <option value="sports">SPORTS</option>
      </select>
    </div>
    <div class="form-group"><label>本文（概要）</label><textarea id="fBody" placeholder="記事の内容を入力..."></textarea></div>
    <div class="form-group"><label>読了時間（分）</label><input id="fRead" type="number" min="1" max="60" placeholder="5"></div>
    <div class="form-group"><label>日付</label><input id="fDate" type="date"></div>
    <div class="form-actions">
      <button class="save-btn" onclick="saveArticle()">保存する</button>
      <button class="cancel-btn" onclick="closeForm()">キャンセル</button>
    </div>
  </div>
</div>

<script src="articles.js"></script>
<script>
  const PASSWORD = 'fold2026';
  let articles = JSON.parse(localStorage.getItem('fold_articles')) || ARTICLES;
  let editId = null;

  const catColors = {lifestyle:'cat-lifestyle',tech:'cat-tech',sports:'cat-sports'};
  const catLabels = {lifestyle:'LIFESTYLE',tech:'TECH · IT',sports:'SPORTS'};

  function login() {
    const pw = document.getElementById('pw-input').value;
    if (pw === PASSWORD) {
      sessionStorage.setItem('fold_auth', '1');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      renderAdmin();
    } else {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('pw-input').value = '';
    }
  }

  function logout() {
    sessionStorage.removeItem('fold_auth');
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pw-input').value = '';
  }

  function renderAdmin() {
    const list = document.getElementById('adminList');
    if (!articles.length) {
      list.innerHTML = '<div class="empty">記事がありません</div>';
      return;
    }
    list.innerHTML = articles.map(a => `
      <div class="article-row">
        <span class="cat-badge ${catColors[a.cat]}">${catLabels[a.cat]}</span>
        <span class="row-title">${a.title}</span>
        <span class="row-date">${a.date}</span>
        <button class="edit-btn" onclick="openForm(${a.id})">編集</button>
        <button class="del-btn" onclick="delArticle(${a.id})">削除</button>
      </div>`).join('');
  }

  function openForm(id) {
    editId = id || null;
    document.getElementById('formTitle').textContent = id ? '記事を編集' : '新規記事を作成';
    if (id) {
      const a = articles.find(x => x.id === id);
      document.getElementById('fTitle').value = a.title;
      document.getElementById('fCat').value = a.cat;
      document.getElementById('fBody').value = a.body;
      document.getElementById('fRead').value = a.read;
      document.getElementById('fDate').value = a.date;
    } else {
      document.getElementById('fTitle').value = '';
      document.getElementById('fCat').value = 'lifestyle';
      document.getElementById('fBody').value = '';
      document.getElementById('fRead').value = '5';
      document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
    }
    document.getElementById('formOverlay').classList.add('open');
  }

  function closeForm() {
    document.getElementById('formOverlay').classList.remove('open');
  }

  function saveArticle() {
    const t = document.getElementById('fTitle').value.trim();
    if (!t) return;
    const obj = {
      title: t,
      cat: document.getElementById('fCat').value,
      body: document.getElementById('fBody').value,
      read: document.getElementById('fRead').value || '5',
      date: document.getElementById('fDate').value,
    };
    if (editId) {
      Object.assign(articles.find(a => a.id === editId), obj);
    } else {
      obj.id = Date.now();
      articles.unshift(obj);
    }
    localStorage.setItem('fold_articles', JSON.stringify(articles));
    closeForm();
    renderAdmin();
  }

  function delArticle(id) {
    if (confirm('この記事を削除しますか？')) {
      articles = articles.filter(a => a.id !== id);
      localStorage.setItem('fold_articles', JSON.stringify(articles));
      renderAdmin();
    }
  }

  // セッションチェック
  if (sessionStorage.getItem('fold_auth') === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    renderAdmin();
  }
</script>
</body>
</html>
